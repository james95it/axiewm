<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Ví Ronin - Kiểm tra giá</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .token-row { font-weight: bold; }
        .val-col { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kiểm tra số dư & Giá trị ví</h1>
    <button onclick="main()" style="padding:10px 20px;">🔄 Tải lại dữ liệu (Debug)</button>
    <p id="status"></p>
    
    <table id="tbl">
        <thead><tr><th>Token</th><th>Số lượng</th><th>Giá ($)</th><th>Giá trị ($)</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <h2 id="total-final">Tổng: $0.00</h2>
</div>

<script>
    const WALLETS = [
        { name: "Cody", address: "0x9b3bc1c03e5a8889e893e54950a7c31c11301b79" },
        { name: "Crystie", address: "0xe9add5b325d2b7f869b3a3c7b1047600a76192f7" },
        { name: "James1", address: "0x39fac7a74365c188c293bd9a064323b50e63cde7" },
	{ name: "Kuro", address: "0x20d9cb64a6c5cf875897a54cf171df930d612abb" },
	{ name: "Loki", address: "0xd985f56b366d1ea58a240b06c34a97919af168f5" },
	{ name: "Momo", address: "0x7f23FBA89336a1B6Cf7D58C88E5acD6656D59B5a" },
	{ name: "Omi", address: "0x92b626df33ba8bf0d3abd7297e48e5e48e1be030" },
	{ name: "Pokemon", address: "0xcee118fb6b827a5ce2eb61cca321e516fdccafdb" },
	{ name: "Randy", address: "0x7ca6b3a5d9ec0ba2ba00298aa67b768d9bbf7e01" },
	{ name: "Shiro", address: "0x641146919c8c720cc9f556cbb4f7f5e9d3e2dd73" },
    ];

    const RPC = "https://api.roninchain.com/rpc";
    const ADDRS = {
        AXS: "0x97a9107c1793bc407d6f527b77e7fff4d812bece",
        SLP: "0xa8754b9fa15fc18bb59458815510e40a12cd2014",
        WETH: "0xc99a6a985ed2cac1ef41640596c5a5f9f4e19ef5"
    };

    // Hàm lấy giá, dùng ID 'weth' thay vì 'wrapped-ether' cho chuẩn xác
    async function getPrices() {
        try {
            const url = "https://api.coingecko.com/api/v3/simple/price?ids=ronin,axie-infinity,smooth-love-potion,weth&vs_currencies=usd";
            const res = await fetch(url);
            return await res.json();
        } catch(e) { return {}; }
    }

    async function call(m, p) {
        const r = await fetch(RPC, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({jsonrpc:"2.0", id:1, method:m, params:p})});
        return (await r.json()).result;
    }

    async function getBal(t, u) {
        const d = "0x70a08231" + u.slice(2).padStart(64, '0');
        const h = await call("eth_call", [{to: t, data: d}, "latest"]);
        return (!h || h === "0x") ? 0 : Number(BigInt(h)) / 1e18;
    }

    async function main() {
        document.getElementById('status').innerText = "Đang tải dữ liệu...";
        const p = await getPrices();
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = "";
        
        // Lấy dữ liệu cho ví Cody
        const w = WALLETS[0];
        const ronHex = await call("eth_getBalance", [w.address, "latest"]);
        const rBal = ronHex ? Number(BigInt(ronHex)) / 1e18 : 0;
        const aBal = await getBal(ADDRS.AXS, w.address);
        const sBal = await getBal(ADDRS.SLP, w.address);
        const wBal = await getBal(ADDRS.WETH, w.address);

        // Giá từ API
        const pRon = p.ronin?.usd || 0;
        const pAxs = p['axie-infinity']?.usd || 0;
        const pSlp = p['smooth-love-potion']?.usd || 0;
        const pWeth = p.weth?.usd || 0;

        // Tính toán
        const data = [
            { name: "RON", qty: rBal, price: pRon },
            { name: "AXS", qty: aBal, price: pAxs },
            { name: "SLP", qty: sBal, price: pSlp },
            { name: "WETH", qty: wBal, price: pWeth }
        ];

        let total = 0;
        data.forEach(item => {
            const val = item.qty * item.price;
            total += val;
            tbody.innerHTML += `<tr>
                <td class="token-row">${item.name}</td>
                <td>${item.qty.toFixed(4)}</td>
                <td>$${item.price.toFixed(2)}</td>
                <td class="val-col">$${val.toFixed(2)}</td>
            </tr>`;
        });

        document.getElementById('total-final').innerText = "Tổng ví: $" + total.toFixed(2);
        document.getElementById('status').innerText = "Đã cập nhật xong.";
    }
</script>
</body>
</html>
